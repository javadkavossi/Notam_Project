info:
  contact: {}
paths:
  /v1/health/:
    get:
      consumes:
      - application/json
      description: بررسی وضعیت عملکرد API
      produces:
      - application/json
      responses:
        "200":
          description: پاسخ موفق
          schema:
            $ref: '#/definitions/github_com_hossein-repo_BaseProject_api_helper.BaseHttpResponse'
        "400":
          description: پاسخ ناموفق
          schema:
            $ref: '#/definitions/github_com_hossein-repo_BaseProject_api_helper.BaseHttpResponse'
      summary: سلامت سرویس
      tags:
      - سلامت
  /v1/test/body:
    post:
      consumes:
      - application/json
      description: دریافت و اعتبارسنجی اطلاعات شخص از طریق JSON body
      parameters:
      - description: اطلاعات شخص
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/src_api_handlers.PersonData'
      produces:
      - application/json
      responses:
        "200":
          description: اطلاعات با موفقیت ثبت شد
          schema:
            $ref: '#/definitions/github_com_hossein-repo_BaseProject_api_helper.BaseHttpResponse'
        "400":
          description: خطای اعتبارسنجی داده‌های ورودی
          schema:
            $ref: '#/definitions/github_com_hossein-repo_BaseProject_api_helper.BaseHttpResponse'
      security:
      - AuthBearer: []
      summary: ثبت اطلاعات شخص
      tags:
      - تست-بادی
  /v1/test/user/{id}:
    get:
      consumes:
      - application/json
      description: دریافت اطلاعات کاربر بر اساس شناسه
      parameters:
      - description: شناسه کاربر
        example: 123
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: پاسخ موفق
          schema:
            $ref: '#/definitions/github_com_hossein-repo_BaseProject_api_helper.BaseHttpResponse'
        "400":
          description: شناسه نامعتبر
          schema:
            $ref: '#/definitions/github_com_hossein-repo_BaseProject_api_helper.BaseHttpResponse'
        "404":
          description: کاربر یافت نشد
          schema:
            $ref: '#/definitions/github_com_hossein-repo_BaseProject_api_helper.BaseHttpResponse'
      summary: دریافت کاربر توسط ID
      tags:
      - کاربران
  /v1/users/send-otp:
    post:
      consumes:
      - application/json
      description: Send otp to user
      parameters:
      - description: GetOtpRequest
        in: body
        name: Request
        required: true
        schema:
          $ref: '#/definitions/github_com_hossein-repo_BaseProject_api_dto.GetOtpRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Success
          schema:
            $ref: '#/definitions/github_com_hossein-repo_BaseProject_api_helper.BaseHttpResponse'
        "400":
          description: Failed
          schema:
            $ref: '#/definitions/github_com_hossein-repo_BaseProject_api_helper.BaseHttpResponse'
        "409":
          description: Failed
          schema:
            $ref: '#/definitions/github_com_hossein-repo_BaseProject_api_helper.BaseHttpResponse'
      summary: Send otp to user
      tags:
      - Users
securityDefinitions:
  AuthBearer:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
