version: '3.8'

services:
  notam-consumer:
    build:
      context: ./src
      dockerfile: Dockerfile
    image: notam-consumer:latest
    container_name: faa-notam-consumer
    restart: unless-stopped
    environment:
      # مقادیر حساس از فایل .env خوانده می‌شوند (کامیت نمی‌شود). نمونه: .env.example
      - APP_ENV=docker
      - TZ=Asia/Tehran
      - AUTH_USER=${AUTH_USER:-admin}
      - AUTH_PASS=${AUTH_PASS:?set AUTH_PASS in .env}
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET in .env}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-}
      - SOLACE_HOST=${SOLACE_HOST:-tcps://ems2.swim.faa.gov:55443}
      - SOLACE_VPN=${SOLACE_VPN:-AIM_FNS}
      - SOLACE_USERNAME=${SOLACE_USERNAME:?set SOLACE_USERNAME in .env}
      - SOLACE_PASSWORD=${SOLACE_PASSWORD:?set SOLACE_PASSWORD in .env}
      - SOLACE_QUEUE=${SOLACE_QUEUE:?set SOLACE_QUEUE in .env}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    ports:
      - "5005:5005"
    volumes:
      - ./src/logs:/app/logs
    networks:
      - notam_network
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgis/postgis:16-3.4  # شامل افزونهٔ PostGIS (E0-6)
    container_name: notam_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-notam_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - notam_network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: notam_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?set PGADMIN_PASSWORD in .env}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "8091:80"
    networks:
      - notam_network
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: notam-frontend
    ports:
      - "3000:80"
    networks:
      - notam_network
    depends_on:
      - notam-consumer
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: notam_redis
    command: ["redis-server", "/etc/redis/redis.conf"]
    volumes:
      - ./docker/redis/redis.conf:/etc/redis/redis.conf
    ports:
      - "6379:6379"
    networks:
      - notam_network
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:

networks:
  notam_network:
    driver: bridge
